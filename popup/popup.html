<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ApplyRadar</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface-2: #f0efe9;
      --border: #e2e0d8;
      --text: #1a1814;
      --text-2: #6b6760;
      --text-dim: #b0ada4;
      --accent: #1a1a2e;
      --green: #16a34a;
      --yellow: #d97706;
      --red: #dc2626;
      --naukri: #e85d25;
      --linkedin: #0077b5;
      --internshala: #0096cc;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      background: var(--accent);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 9px; }
    .logo-icon {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-size: 15px; font-weight: 700; color: #e8d5b7; letter-spacing: -0.01em; }
    .version { font-size: 10px; color: rgba(232,213,183,0.5); font-family: 'DM Mono', monospace; }
    .dashboard-btn {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 7px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      color: #e8d5b7;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: all 0.15s;
    }
    .dashboard-btn:hover { background: rgba(255,255,255,0.2); }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      background: var(--surface);
      padding: 12px 8px;
      text-align: center;
    }
    .stat-num {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 3px;
    }
    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Platform row ── */
    .platforms {
      display: flex;
      padding: 10px 16px;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .platform-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-2);
    }
    .platform-dot { width: 7px; height: 7px; border-radius: 50%; }
    .platform-count { font-weight: 700; color: var(--text); font-family: 'DM Mono', monospace; }

    /* ── Quick save ── */
    .quick-save {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .qs-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }
    .qs-saved {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f0fdf4;
      border: 1px solid #16a34a44;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
    }
    .btn-save {
      width: 100%;
      background: var(--accent);
      color: #e8d5b7;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.15s;
    }
    .btn-save:hover:not(:disabled) { opacity: 0.88; }
    .btn-save:disabled { opacity: 0.5; cursor: default; }
    .qs-tip {
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      margin-top: 6px;
    }

    /* ── Recent ── */
    .recent-header {
      padding: 10px 16px 6px;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      background: var(--surface);
    }
    .recent-list { background: var(--surface); }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .recent-item:hover { background: var(--surface-2); }
    .recent-plat {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .recent-info { flex: 1; min-width: 0; }
    .recent-title {
      font-size: 12px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .recent-company {
      font-size: 11px; color: var(--text-2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .status-pill {
      font-size: 10px; font-family: 'DM Mono', monospace;
      padding: 2px 7px; border-radius: 99px;
      text-transform: uppercase; letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .s-saved    { background:#eff6ff; color:#2563eb; }
    .s-applied  { background:#f0fdf4; color:#16a34a; }
    .s-interview{ background:#fffbeb; color:#d97706; }
    .s-offer    { background:#f0fdf4; color:#15803d; }
    .s-rejected { background:#fef2f2; color:#dc2626; }

    /* ── Empty ── */
    .empty {
      padding: 24px 16px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.8;
      background: var(--surface);
    }
    .empty-icon { font-size: 28px; margin-bottom: 8px; }

    /* ── How to ── */
    .how-to {
      padding: 12px 16px;
      background: var(--surface-2);
      border-top: 1px solid var(--border);
    }
    .how-to-title {
      font-size: 11px; font-weight: 700;
      color: var(--text-2); margin-bottom: 8px;
    }
    .how-to-steps { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .how-to-step { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text-2); }
    .step-num {
      width: 17px; height: 17px; border-radius: 50%;
      background: var(--border); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; flex-shrink: 0;
    }
    .linkedin-tip {
      font-size: 10px; color: var(--text-dim);
      background: #eff6ff;
      border: 1px solid #0077b522;
      border-radius: 6px;
      padding: 7px 9px;
      display: flex; align-items: flex-start; gap: 6px;
      line-height: 1.5;
    }
    .linkedin-tip strong { color: var(--text); }

    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    .anim { animation: fadeIn 0.25s ease both; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e8d5b7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <span class="logo-text">ApplyRadar</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="version">v1.1</span>
      <button class="dashboard-btn" id="open-dashboard">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats anim">
    <div class="stat">
      <div class="stat-num" id="total-count">—</div>
      <div class="stat-label">Saved</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="applied-count" style="color:var(--green)">—</div>
      <div class="stat-label">Applied</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="interview-count" style="color:var(--yellow)">—</div>
      <div class="stat-label">Interviews</div>
    </div>
  </div>

  <!-- Platform breakdown -->
  <div class="platforms">
    <div class="platform-item">
      <span class="platform-dot" style="background:var(--naukri)"></span>
      <span>Naukri</span>
      <span class="platform-count" id="naukri-count">0</span>
    </div>
    <div class="platform-item">
      <span class="platform-dot" style="background:var(--linkedin)"></span>
      <span>LinkedIn</span>
      <span class="platform-count" id="linkedin-count">0</span>
    </div>
    <div class="platform-item">
      <span class="platform-dot" style="background:var(--internshala)"></span>
      <span>Internshala</span>
      <span class="platform-count" id="internshala-count">0</span>
    </div>
  </div>

  <!-- Quick save -->
  <div class="quick-save" id="quick-save-section"></div>

  <!-- Recent -->
  <div id="recent-section"></div>

  <!-- How to use -->
  <div class="how-to">
    <div class="how-to-title">💡 How to save a job</div>
    <div class="how-to-steps">
      <div class="how-to-step"><span class="step-num">1</span> Open any job <strong>detail</strong> page</div>
      <div class="how-to-step"><span class="step-num">2</span> Click <strong>Save to ApplyRadar</strong> on the page</div>
      <div class="how-to-step"><span class="step-num">3</span> Or use the button above if not visible</div>
    </div>
    <div class="linkedin-tip">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="#0077b5" style="margin-top:2px;flex-shrink:0"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      <span><strong>LinkedIn:</strong> Click a listing → click the job title link → URL must show <strong>/jobs/view/</strong></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
