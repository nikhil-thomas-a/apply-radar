<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApplyRadar — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Light mode (default) ── */
    :root, [data-theme="light"] {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface-2: #f0efe9;
      --border: #e2e0d8;
      --border-subtle: #ebe9e2;
      --text: #1a1814;
      --text-2: #6b6760;
      --text-dim: #b0ada4;
      --accent: #1a1814;
      --accent-warm: #b07d3a;
      --topbar-bg: #ffffff;
      --sidebar-bg: #faf9f6;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --saved:     #2563eb;
      --applied:   #16a34a;
      --interview: #d97706;
      --offer:     #15803d;
      --rejected:  #dc2626;
      --naukri:     #e85d25;
      --linkedin:   #0077b5;
      --internshala:#0096cc;
      --r: 10px;
      --r-sm: 7px;
    }

    /* ── Dark mode ── */
    [data-theme="dark"] {
      --bg: #0c0c10;
      --surface: #13131a;
      --surface-2: #1c1c26;
      --border: #26263a;
      --border-subtle: #1e1e2c;
      --text: #e8d5b7;
      --text-2: #9490a8;
      --text-dim: #4a4760;
      --accent: #e8d5b7;
      --accent-warm: #d4a96a;
      --topbar-bg: #13131a;
      --sidebar-bg: #13131a;
      --shadow: none;
      --saved:     #3b82f6;
      --applied:   #4ade80;
      --interview: #f59e0b;
      --offer:     #86efac;
      --rejected:  #f87171;
      --naukri:     #ff6b35;
      --linkedin:   #0077b5;
      --internshala:#00aeef;
      --r: 10px;
      --r-sm: 7px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* noise overlay — only in dark mode */
    [data-theme="dark"] body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025; pointer-events: none; z-index: 0;
    }

    /* ── Drag and drop ── */
    .card[draggable="true"] { cursor: grab; }
    .card[draggable="true"]:active { cursor: grabbing; }
    .card.dragging { opacity: 1; }
    .card.drag-ghost { opacity: 0.4; }

    .col-cards.drag-over {
      background: var(--saved)10;
      border: 2px dashed var(--saved)66;
      border-radius: var(--r);
      transition: background 0.15s, border 0.15s;
    }

    .col-empty {
      border: 1px dashed var(--border);
      border-radius: var(--r);
      padding: 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .layout {
      display: grid;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      position: relative; z-index: 1;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--topbar-bg);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 26px; height: 26px;
      background: #1a1a2e; /* always dark — icon stroke is always light */
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text-2);
      font-family: 'DM Mono', monospace;
    }

    .topbar-stat strong { color: var(--text); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: var(--r-sm);
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.14s ease;
      white-space: nowrap;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }

    .btn-accent {
      background: var(--accent);
      color: #0c0c10;
    }
    .btn-accent:hover { opacity: 0.88; }

    .btn-danger {
      background: transparent;
      color: var(--rejected);
      border: 1px solid var(--rejected)44;
    }
    .btn-danger:hover { background: var(--rejected)18; }

    /* ── Body ── */
    .body {
      display: grid;
      grid-template-columns: 240px 1fr;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--sidebar-bg);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: transparent;
      border: none;
      border-radius: var(--r-sm);
      padding: 7px 10px;
      color: var(--text-2);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.12s;
      text-align: left;
    }

    .filter-btn:hover { background: var(--surface-2); color: var(--text); }
    .filter-btn.active { background: var(--surface-2); color: var(--text); }

    .filter-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .search-box {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.14s;
    }
    .search-box:focus { border-color: var(--accent)55; }
    .search-box::placeholder { color: var(--text-dim); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mini-stat {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px;
      text-align: center;
    }

    .mini-stat-num {
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .mini-stat-label {
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Main ── */
    .main {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 20px 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .view-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    /* ── Kanban ── */
    .kanban {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      overflow-y: hidden;
      flex: 1;
      padding-bottom: 8px;
    }

    .kanban::-webkit-scrollbar { height: 4px; }
    .kanban::-webkit-scrollbar-track { background: transparent; }
    .kanban::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .column {
      flex-shrink: 0;
      width: 260px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }

    .col-title {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-2);
    }

    .col-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .col-badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface-2);
      padding: 1px 7px;
      border-radius: 4px;
    }

    .col-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      flex: 1;
      padding-right: 2px;
    }

    .col-cards::-webkit-scrollbar { width: 3px; }
    .col-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Job Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 13px 14px;
      cursor: pointer;
      transition: all 0.14s ease;
      position: relative;
      animation: cardIn 0.25s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: var(--accent)33;
      background: var(--surface-2);
      transform: translateY(-1px);
    }

    .card.duplicate {
      border-color: var(--interview)44;
    }

    .card-platform {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .platform-badge {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .platform-naukri     { background: #ff6b3518; color: var(--naukri); }
    .platform-linkedin   { background: #0077b518; color: var(--linkedin); }
    .platform-internshala{ background: #00aeef18; color: var(--internshala); }

    .dup-badge {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--interview);
      background: #f59e0b18;
      padding: 2px 7px;
      border-radius: 4px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 3px;
      color: var(--text);
    }

    .card-company {
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 8px;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }

    .meta-tag {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface-2);
      padding: 2px 7px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-date {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
    }

    .card-actions {
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      width: 26px; height: 26px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text-dim);
      transition: all 0.12s;
    }
    .icon-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--accent)44; }
    .icon-btn.delete:hover { background: var(--rejected)18; color: var(--rejected); border-color: var(--rejected)44; }

    /* col-empty defined above with drag styles */

    /* ── Detail drawer ── */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: #0c0c1088;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      top: 0; right: -440px;
      width: 420px; height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 101;
      transition: right 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .drawer.open { right: 0; }

    .drawer-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .drawer-title { font-size: 16px; font-weight: 700; line-height: 1.3; }
    .drawer-company { font-size: 13px; color: var(--text-2); margin-top: 3px; }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .drawer-section-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .status-select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 9px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }
    .status-select:focus { border-color: var(--accent)55; }

    .notes-area {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      resize: vertical;
      min-height: 90px;
    }
    .notes-area:focus { border-color: var(--accent)55; }
    .notes-area::placeholder { color: var(--text-dim); }

    .detail-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
    }

    .detail-label {
      color: var(--text-dim);
      min-width: 80px;
      flex-shrink: 0;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding-top: 2px;
    }

    .detail-value { color: var(--text); word-break: break-word; }

    .detail-link {
      color: var(--accent-warm);
      text-decoration: none;
      font-size: 12px;
      word-break: break-all;
    }
    .detail-link:hover { text-decoration: underline; }

    .drawer-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      z-index: 200;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      gap: 12px;
      color: var(--text-dim);
    }

    .empty-state-icon {
      font-size: 40px;
      opacity: 0.5;
    }

    .empty-state h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .empty-state p {
      font-size: 13px;
      max-width: 320px;
      line-height: 1.7;
    }

    .platform-chips {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .platform-chip {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid;
      font-family: 'DM Mono', monospace;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn 0.3s ease both; }
  </style>
</head>
<body>

<div class="layout">

  <!-- Topbar -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-mark">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#e8d5b7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <span class="logo-name">ApplyRadar</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-stat">
        <strong id="hdr-total">0</strong> tracked
      </div>
      <div class="topbar-stat" id="hdr-dup-wrap" style="display:none">
        <strong id="hdr-dups" style="color:var(--interview)">0</strong> duplicates
      </div>
      <button class="btn btn-ghost" id="theme-toggle" title="Toggle light/dark mode">
        <!-- icon set by JS -->
      </button>
      <button class="btn btn-ghost" id="export-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export CSV
      </button>
    </div>
  </header>

  <div class="body">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div>
        <div class="sidebar-section-label">Search</div>
        <input class="search-box" id="search" placeholder="Job title or company…" />
      </div>

      <div>
        <div class="sidebar-section-label">Filter by status</div>
        <div style="display:flex;flex-direction:column;gap:2px">
          <button class="filter-btn active" data-filter="all">
            <span class="filter-left">
              <span class="filter-dot" style="background:var(--accent)"></span>All jobs
            </span>
            <span class="filter-count" id="count-all">0</span>
          </button>
          <button class="filter-btn" data-filter="saved">
            <span class="filter-left">
              <span class="filter-dot" style="background:var(--saved)"></span>Saved
            </span>
            <span class="filter-count" id="count-saved">0</span>
          </button>
          <button class="filter-btn" data-filter="applied">
            <span class="filter-left">
              <span class="filter-dot" style="background:var(--applied)"></span>Applied
            </span>
            <span class="filter-count" id="count-applied">0</span>
          </button>
          <button class="filter-btn" data-filter="interview">
            <span class="filter-left">
              <span class="filter-dot" style="background:var(--interview)"></span>Interview
            </span>
            <span class="filter-count" id="count-interview">0</span>
          </button>
          <button class="filter-btn" data-filter="offer">
            <span class="filter-left">
              <span class="filter-dot" style="background:var(--offer)"></span>Offer
            </span>
            <span class="filter-count" id="count-offer">0</span>
          </button>
          <button class="filter-btn" data-filter="rejected">
            <span class="filter-left">
              <span class="filter-dot" style="background:var(--rejected)"></span>Rejected
            </span>
            <span class="filter-count" id="count-rejected">0</span>
          </button>
        </div>
      </div>

      <div>
        <div class="sidebar-section-label">Platform</div>
        <div style="display:flex;flex-direction:column;gap:2px">
          <button class="filter-btn active" data-platform="all">
            <span class="filter-left"><span class="filter-dot" style="background:var(--text-dim)"></span>All</span>
            <span class="filter-count" id="pcount-all">0</span>
          </button>
          <button class="filter-btn" data-platform="naukri">
            <span class="filter-left"><span class="filter-dot" style="background:var(--naukri)"></span>Naukri</span>
            <span class="filter-count" id="pcount-naukri">0</span>
          </button>
          <button class="filter-btn" data-platform="linkedin">
            <span class="filter-left"><span class="filter-dot" style="background:var(--linkedin)"></span>LinkedIn</span>
            <span class="filter-count" id="pcount-linkedin">0</span>
          </button>
          <button class="filter-btn" data-platform="internshala">
            <span class="filter-left"><span class="filter-dot" style="background:var(--internshala)"></span>Internshala</span>
            <span class="filter-count" id="pcount-internshala">0</span>
          </button>
        </div>
      </div>

      <div>
        <div class="sidebar-section-label">Stats</div>
        <div class="stats-grid" id="stats-grid">
          <div class="mini-stat">
            <div class="mini-stat-num" id="stat-total">0</div>
            <div class="mini-stat-label">Total</div>
          </div>
          <div class="mini-stat">
            <div class="mini-stat-num" style="color:var(--applied)" id="stat-applied">0</div>
            <div class="mini-stat-label">Applied</div>
          </div>
          <div class="mini-stat">
            <div class="mini-stat-num" style="color:var(--interview)" id="stat-interview">0</div>
            <div class="mini-stat-label">Interviews</div>
          </div>
          <div class="mini-stat">
            <div class="mini-stat-num" style="color:var(--offer)" id="stat-offer">0</div>
            <div class="mini-stat-label">Offers</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="main-header">
        <span class="view-title" id="view-title">All Applications</span>
      </div>
      <div class="kanban" id="kanban"></div>
    </main>
  </div>
</div>

<!-- Detail Drawer -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-title" id="d-title"></div>
      <div class="drawer-company" id="d-company"></div>
    </div>
    <button class="icon-btn" id="drawer-close">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer">
    <button class="btn btn-accent" id="d-save-btn" style="flex:1">Save changes</button>
    <button class="btn btn-danger" id="d-delete-btn">Delete</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="dashboard.js"></script>
</body>
</html>
